name: "Godot Export and Release"
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable
      - name: Windows Build
        run: |
          mkdir -p builds/windows
          godot --headless --export-release "Windows Desktop" builds/windows/Pixbots-G.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: builds/windows

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.2.2.stable ~/.local/share/godot/export_templates/4.2.2.stable
      - name: Linux Build
        run: |
          mkdir -p builds/linux
          godot --headless --export-release "Linux/X11" builds/linux/Pixbots-G.x86_64
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: builds/linux

  release:
    name: Release
    needs: [export-windows, export-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: builds/windows
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: builds/linux
      - name: Zip Builds
        run: |
          cd builds/windows && zip -r ../Pixbots-G-Windows.zip . && cd ../..
          cd builds/linux && zip -r ../Pixbots-G-Linux.zip . && cd ../..
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          generate_release_notes: true
          files: |
            builds/Pixbots-G-Windows.zip
            builds/Pixbots-G-Linux.zip
